<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NFL GM League Office</title>
    <link rel="stylesheet" href="./styles.css?v=20260601-fa-market-pulse">
  </head>
  <body>
    <main class="shell">
      <aside class="rail">
        <div class="brand">
          <strong>NFL GM</strong>
          <span id="seasonLabel"></span>
        </div>
        <button id="railToggle" class="rail-toggle" type="button" aria-label="Collapse navigation" aria-pressed="false">
          <span class="rail-toggle-icon">=</span>
          <span class="rail-toggle-text">Collapse</span>
        </button>
        <nav class="nav" aria-label="Game center sections">
          <span class="nav-label">Today</span>
          <button type="button" data-view="today" class="active">Today</button>
          <button type="button" data-view="calendar">Calendar</button>
          <button type="button" data-view="inbox">Inbox</button>

          <span class="nav-label">League</span>
          <button type="button" data-view="season">Standings</button>
          <button type="button" data-view="playoffTree" hidden>Playoffs Tree</button>
          <button type="button" data-view="stats">Stats</button>
          <button type="button" data-view="awards">Awards</button>
          <button type="button" data-view="history">History</button>
          <button type="button" data-view="leagueNews">League News</button>
          <button type="button" data-view="transactions">Transactions</button>
          <button type="button" data-view="injuries">Injuries</button>

          <span class="nav-label">Team</span>
          <button type="button" data-view="roster">Roster</button>
          <button type="button" data-view="practiceSquad">Roster Cutdown</button>
          <button type="button" data-view="depth">Depth Chart</button>
          <button type="button" data-view="contracts">Contracts</button>

          <span class="nav-label">Roster Building</span>
          <button type="button" data-view="scouting">Scouting</button>
          <button type="button" data-view="freeAgency">Free Agency</button>
          <button type="button" data-view="waivers">Waivers</button>
          <button type="button" data-view="trades">Trade Center</button>
          <button type="button" data-view="draft">Draft Room</button>

          <span class="nav-label">Quick Links</span>
          <div class="links" aria-label="Quick links">
            <a href="../app_shell/index.html">Main Menu</a>
            <a href="../front_office/index.html">Front Office</a>
            <a href="../player_profile/index.html">Player Profiles</a>
            <a href="../player_card/index.html">Player Cards</a>
          </div>

          <span class="nav-label">League Office</span>
          <button type="button" data-view="aiGm">CPU Front Offices</button>
        </nav>
      </aside>

      <section class="workspace">
        <header class="hero">
          <div>
            <button id="backButton" class="back-button" type="button" disabled>Back</button>
            <p id="phaseText" class="eyebrow"></p>
            <h1 id="title">League Office</h1>
            <p id="subhead" class="subhead"></p>
            <div id="liveStatus" class="live-status" hidden></div>
          </div>
          <div class="hero-stack">
            <div>
              <span>Current Date</span>
              <strong id="dateText"></strong>
            </div>
            <div>
              <span>Active Save</span>
              <strong id="saveText"></strong>
            </div>
          </div>
        </header>

        <section id="content" class="content"></section>
      </section>
    </main>

    <div id="runnerToast" class="runner-toast" hidden></div>

    <script src="./game-center-data.js?v=20260601-why-panels"></script>
    <script src="./app.js?v=20260601-fa-market-pulse"></script>
  </body>
</html>

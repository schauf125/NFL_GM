<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NFL GM Season Hub</title>
    <link rel="stylesheet" href="./styles.css?v=20260507-draft-board-sort">
  </head>
  <body>
    <main class="shell">
      <aside class="rail">
        <div class="brand">
          <strong>NFL GM</strong>
          <span id="seasonLabel"></span>
        </div>
        <div class="links" aria-label="Quick links">
          <a href="../app_shell/index.html">Main Menu</a>
          <a href="../front_office/index.html">Front Office</a>
          <a href="../player_profile/index.html">Player Profiles</a>
          <a href="../player_card/index.html">Player Cards</a>
        </div>
        <nav class="nav" aria-label="Game center sections">
          <span class="nav-label">Season Flow</span>
          <button type="button" data-view="overview" class="active">Season Hub</button>
          <button type="button" data-view="season">League Table</button>
          <button type="button" data-view="stats">Stats</button>
          <span class="nav-label">Front Office</span>
          <button type="button" data-view="inbox">Inbox</button>
          <button type="button" data-view="leagueNews">League News</button>
          <button type="button" data-view="scouting">Scouting</button>
          <span class="nav-label">Roster Work</span>
          <button type="button" data-view="depth">Depth Chart</button>
          <button type="button" data-view="contracts">Contract Talks</button>
          <button type="button" data-view="freeAgency">Free Agency</button>
          <button type="button" data-view="draft">Draft Room</button>
          <span class="nav-label">League Tools</span>
          <button type="button" data-view="aiGm">AI GMs</button>
          <button type="button" data-view="calendar">Calendar</button>
          <button type="button" data-view="commands">Commands</button>
        </nav>
      </aside>

      <section class="workspace">
        <header class="hero">
          <div>
            <p id="phaseText" class="eyebrow"></p>
            <h1 id="title">Game Center</h1>
            <p id="subhead" class="subhead"></p>
            <div id="liveStatus" class="live-status" hidden></div>
          </div>
          <div class="hero-stack">
            <div>
              <span>Current Date</span>
              <strong id="dateText"></strong>
            </div>
            <div>
              <span>Active Save</span>
              <strong id="saveText"></strong>
            </div>
          </div>
        </header>

        <section id="content" class="content"></section>
      </section>
    </main>

    <div id="runnerToast" class="runner-toast" hidden></div>

    <script src="./game-center-data.js?v=20260506-live-scouting-fa"></script>
    <script src="./app.js?v=20260507-draft-board-sort"></script>
  </body>
</html>
